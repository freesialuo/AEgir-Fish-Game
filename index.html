<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阿戈尔吃鱼小游戏V2.0</title>
  <style>
    body { margin: 0; padding: 0; background-color: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; font-family: sans-serif; }
    #game-wrapper { position: relative; aspect-ratio: 16 / 9; width: 100%; max-width: 1920px; max-height: 1080px; background-color: #000; }
    .ui-layer { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.7); color: white; display: none; z-index: 10; }
    .ui-layer h1 { font-size: 4vw; margin-bottom: 10px; }
    .ui-layer p { font-size: 1.5vw; }
    button { margin-top: 20px; padding: 1vw 3vw; font-size: 1.5vw; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 10px; z-index: 10; }
    button:hover { background-color: #45a049; }
    #hud { position: absolute; top: 50px; left: 60px; width: 100%; color: white; font-size: 2vw; font-weight: bold; text-shadow: 2px 2px 4px #000; pointer-events: none; z-index: 10; text-align: left; }
    #loading-screen { display: flex; background: #1a252c; z-index: 20; }
    canvas {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain;
      border: 2px solid #ecf0f1;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div id="game-wrapper">
    <div id="loading-screen" class="ui-layer" style="display: flex;">
        <h1 id="loading-text">资源加载中 (0%)...</h1>
    </div>

    <div id="hud">
        剩余时间 Time left: <span id="time-display">60</span>s
    </div>

    <div id="game-over-screen" class="ui-layer">
        <h1>游戏结束</h1>
        <p>本次得分: <span id="final-score">0</span></p>
        <div id="leaderboard" style="margin-top: 20px; text-align: center;">
            <h3>排行榜 (Top 5)</h3>
            <ol id="leaderboard-list" style="text-align: left; font-size: 1.2vw;"></ol>
        </div>
        <button id="restart-button">重新开始 (按空格键)</button>
    </div>
</div>

<script type="module" src="src/game.js"></script>
</body>
</html>
